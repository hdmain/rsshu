name: Build Linux

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # needed to upload release assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri (Linux)
        run: npm run tauri -- build

      - name: Upload Linux artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Uploading artifacts for release $TAG"

          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" 2>/dev/null | head -1)
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" 2>/dev/null | head -1)

          ASSETS=()
          [ -n "$DEB" ]      && ASSETS+=("$DEB")      && echo "  deb:      $DEB"
          [ -n "$APPIMAGE" ] && ASSETS+=("$APPIMAGE") && echo "  AppImage: $APPIMAGE"

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "ERROR: no Linux artifacts found" && exit 1
          fi

          # Wait up to 60 s for the release to exist (release.py may still be running)
          for i in $(seq 1 12); do
            gh release view "$TAG" > /dev/null 2>&1 && break
            echo "  Waiting for release $TAG to appear... ($i/12)"
            sleep 5
          done

          gh release upload "$TAG" "${ASSETS[@]}" --clobber
          echo "Done."
