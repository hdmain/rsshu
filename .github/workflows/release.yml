name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri (Windows)
        run: npm run tauri -- build

      - name: Upload Windows artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          Write-Host "Uploading Windows artifacts for $TAG"

          $MSI     = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi"     -ErrorAction SilentlyContinue | Select-Object -First 1
          $SETUP   = Get-ChildItem "src-tauri/target/release/bundle/nsis/*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1

          $ASSETS = @()
          if ($MSI)   { $ASSETS += $MSI.FullName;   Write-Host "  msi:  $($MSI.Name)" }
          if ($SETUP) { $ASSETS += $SETUP.FullName; Write-Host "  exe:  $($SETUP.Name)" }

          if ($ASSETS.Count -eq 0) {
            Write-Error "No Windows artifacts found"; exit 1
          }

          # Wait up to 90 s for the draft release to appear
          for ($i = 1; $i -le 18; $i++) {
            $out = gh release view $TAG 2>&1
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "  Waiting for release $TAG ... ($i/18)"
            Start-Sleep -Seconds 5
          }

          gh release upload $TAG @ASSETS --clobber

  # ── Linux ─────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri (Linux)
        run: npm run tauri -- build

      - name: Upload Linux artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          echo "Uploading Linux artifacts for $TAG"

          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" 2>/dev/null | head -1)
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" 2>/dev/null | head -1)

          ASSETS=()
          [ -n "$DEB" ]      && ASSETS+=("$DEB")      && echo "  deb:      $DEB"
          [ -n "$APPIMAGE" ] && ASSETS+=("$APPIMAGE") && echo "  AppImage: $APPIMAGE"

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "ERROR: no Linux artifacts found" && exit 1
          fi

          # Wait up to 90 s for the draft release to appear
          for i in $(seq 1 18); do
            gh release view "$TAG" > /dev/null 2>&1 && break
            echo "  Waiting for release $TAG ... ($i/18)"
            sleep 5
          done

          gh release upload "$TAG" "${ASSETS[@]}" --clobber

  # ── Publish ───────────────────────────────────────────────────────────────────
  publish:
    name: Publish release
    runs-on: ubuntu-22.04
    needs: [build-windows, build-linux]
    permissions:
      contents: write

    steps:
      - name: Publish draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          echo "Publishing $TAG"
          gh release edit "$TAG" --draft=false --repo "${{ github.repository }}"
          echo "Done: https://github.com/${{ github.repository }}/releases/tag/$TAG"
